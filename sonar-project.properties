# SonarCloud configuration
# Import the project at: https://sonarcloud.io/projects/create

sonar.projectKey=Tight-Line_ballast
sonar.organization=tight-line

sonar.projectName=ballast
sonar.projectVersion=0.1.0

# Source configuration
sonar.sources=.
sonar.exclusions=**/*_test.go,**/testdata/**,**/vendor/**,**/config/**,**/hack/**,**/zz_generated*.go
sonar.tests=.
sonar.test.inclusions=**/*_test.go

# Coverage (generated by make test-coverage-check)
sonar.go.coverage.reportPaths=coverage.filtered.out
# api/v1 contains CRD type definitions (structs + kubebuilder markers) — not unit-testable.
# zz_generated deep-copy code is excluded from analysis entirely above.
sonar.coverage.exclusions=cmd/**/*,test/**/*,api/v1/**/*

sonar.sourceEncoding=UTF-8
