# SonarCloud configuration
# Import the project at: https://sonarcloud.io/projects/create

sonar.projectKey=Tight-Line_ballast
sonar.organization=tight-line

sonar.projectName=ballast
sonar.projectVersion=0.1.0

# Source configuration
sonar.sources=.
sonar.exclusions=**/*_test.go,**/testdata/**,**/vendor/**,**/config/**,**/hack/**
sonar.tests=.
sonar.test.inclusions=**/*_test.go

# Coverage (generated by make test-coverage-check)
sonar.go.coverage.reportPaths=coverage.out
sonar.coverage.exclusions=cmd/**/*,test/**/*

sonar.sourceEncoding=UTF-8
