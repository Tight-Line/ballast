apiVersion: v1
kind: Service
metadata:
  name: {{ include "ballast.webhookServiceName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ballast.labels" . | nindent 4 }}
spec:
  ports:
  - name: https-webhook
    port: 443
    protocol: TCP
    targetPort: 9443
  selector:
    {{- include "ballast.selectorLabels" . | nindent 4 }}
