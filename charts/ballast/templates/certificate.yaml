{{- if .Values.certManager.enabled }}
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ include "ballast.fullname" . }}-serving-cert
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ballast.labels" . | nindent 4 }}
spec:
  dnsNames:
  - {{ include "ballast.webhookServiceName" . }}.{{ .Release.Namespace }}.svc
  - {{ include "ballast.webhookServiceName" . }}.{{ .Release.Namespace }}.svc.cluster.local
  issuerRef:
    kind: Issuer
    name: {{ include "ballast.fullname" . }}-selfsigned
  secretName: {{ include "ballast.webhookCertSecret" . }}
{{- end }}
