image:
  repository: ghcr.io/tight-line/ballast
  # Defaults to .Chart.AppVersion when empty.
  tag: ""
  pullPolicy: IfNotPresent

replicaCount: 1

nameOverride: ""
fullnameOverride: ""

serviceAccount:
  name: ""

crds:
  # Helm applies the chart's crds/ directory only on first install and never
  # upgrades it, so CRD changes in newer releases would silently not reach the
  # cluster. This hook runs `ballastd apply-crds` (a Job using the operator
  # image) before every install and upgrade to keep the cluster's CRDs in
  # sync. Disable only if CRDs are managed by external tooling; upgrades then
  # require applying config/crd/bases/ by hand.
  upgradeHook:
    enabled: true

# leaderElect enables Kubernetes leader election so only one replica runs the
# controllers at a time. Must be true when replicaCount > 1; otherwise all
# replicas run every controller simultaneously, causing duplicate Redis writes,
# concurrent WorkloadProfile patches, and racing resize decisions.
leaderElect: false

resources:
  limits:
    cpu: 500m
    memory: 128Mi
    ephemeral-storage: 256Mi
  requests:
    cpu: 10m
    memory: 64Mi
    ephemeral-storage: 64Mi

logging:
  level: info
  # Per-component overrides. Leave empty to inherit the global level.
  webhook: ""
  watcher: ""
  collector: ""
  adjuster: ""
  format: json
  # stdout controls the human-facing log stream written to the container's
  # stderr (the stream a node/stdout log collector scrapes).
  stdout:
    # enabled writes logs to stderr. Set false to ship logs only via OTLP.
    enabled: true
    # additionalKeys are static key/value pairs added to every stdout log line
    # only; they are never sent on the OTLP path. Empty by default. Example:
    #   additionalKeys:
    #     otlp: true
    # so a stdout log collector can skip lines already exported via OTLP and
    # avoid double-ingesting them. This is deliberately not a Ballast default.
    additionalKeys: {}
  # otel ships logs to the OTLP collector configured under telemetry.otel, with
  # each structured log key promoted to a top-level OTel log-record attribute.
  # It shares telemetry.otel's endpoint/protocol/insecure settings and has no
  # effect unless telemetry.otel.enabled is true. Left on by default so enabling
  # OTel (for metrics) also ships logs; set enabled: false to keep metrics on
  # OTLP but not logs.
  otel:
    enabled: true

dryRun:
  measure: false
  apply: false
  resize: false

ballastConfig:
  # identityLabels: ordered list of pod label keys that form a WorkloadProfile
  # identity tuple. Must be set at install time; changing it requires migration.
  #
  # WorkloadProfiles are cluster-scoped. Every pod in every namespace that shares
  # the same label values for these keys contributes measurements to the same
  # profile. This is intentional — 40 dev namespaces running the same app produce
  # one well-sampled profile, not 40 thin ones.
  #
  # If your cluster runs mixed environments (dev + staging + prod) and you want
  # separate profiles per environment, add ballast.tightlinesoftware.com/resource-profile
  # to this list and apply it to your pods:
  #   identityLabels:
  #     - app.kubernetes.io/name
  #     - app.kubernetes.io/component
  #     - ballast.tightlinesoftware.com/resource-profile
  identityLabels:
    - app.kubernetes.io/name
    - app.kubernetes.io/component
  orphanTTL: "168h"
  retentionWindow: "168h"

# Official Valkey subchart (valkey-io/valkey-helm, BSD-licensed). Set enabled: false
# and provide store.endpoint to use an external Redis/Valkey instance instead.
#
# ############################################################################
# #                                                                          #
# #   !!!  READ THIS BEFORE CHANGING ANY VALKEY MEMORY OR STORAGE VALUE  !!!  #
# #                                                                          #
# #   The four sizing knobs below are LINKED. They ship small on purpose     #
# #   (fine for dev and modest fleets) and you MUST move them together when  #
# #   you scale up. The relationship is:                                     #
# #                                                                          #
# #       maxmemory  <  memory limit  <=  memory request                     #
# #       PVC size   ~=  2 x memory limit                                    #
# #                                                                          #
# #   WHY each one:                                                          #
# #     * maxmemory (valkeyConfig) is where valkey stops accepting writes.   #
# #       Set it BELOW the container limit so valkey refuses new samples     #
# #       gracefully instead of being OOM-killed. Keep policy noeviction:    #
# #       samples and their first-seen markers have no TTL, and evicting a   #
# #       first-seen key silently resets that workload to Accruing.          #
# #     * memory request == limit keeps the pod out of BestEffort QoS. The   #
# #       subchart default (resources: {}) is BestEffort, the FIRST thing    #
# #       the kubelet evicts under node memory pressure, and an evicted      #
# #       valkey loses its store. This is the failure that motivated these   #
# #       defaults.                                                          #
# #     * PVC size ~= 2x the limit: a background save writes a fresh temp    #
# #       RDB next to the live dump.rdb before renaming, so two snapshots    #
# #       must fit at once. RDB compresses, so 2x is generous.               #
# #                                                                          #
# #   The independent variable is the dataset size, roughly                  #
# #   reservoirSize x (containers x metrics per container). If you raise     #
# #   maxmemory to fit a bigger fleet, raise the limit, the request, AND     #
# #   the PVC in lockstep. Bump ONE in isolation and you get either an       #
# #   OOM-killed store or a full PVC that cannot snapshot.                   #
# #                                                                          #
# ############################################################################
valkey:
  enabled: true

  # A ReadWriteOnce PVC (below) cannot be mounted by a new pod while the old
  # pod still holds it, so a RollingUpdate deadlocks. Recreate terminates the
  # old pod first. Single replica, so there is no availability cost.
  deploymentStrategy: Recreate

  # request == limit lifts the pod out of BestEffort (see banner). No CPU limit:
  # a cache should not be CPU-throttled.
  resources:
    requests:
      cpu: 50m
      memory: 96Mi
    limits:
      memory: 96Mi

  # maxmemory sits below the 96Mi container limit so valkey refuses writes
  # gracefully rather than getting OOM-killed; noeviction protects first-seen
  # markers (see banner). If valkey hits maxmemory, collection stalls with a
  # loud error: raise maxmemory, the limit, the request, and the PVC together.
  valkeyConfig: |
    maxmemory 64mb
    maxmemory-policy noeviction

  # Persist the sample store to a PersistentVolumeClaim so accrued history
  # survives valkey pod reschedules (node drains, evictions, upgrades). Without
  # this the subchart backs /data with an emptyDir, so any reschedule wipes
  # every sample and every first-seen marker; because readiness gates on
  # minTimeSpan (default 24h of observed history), a wipe resets the whole fleet
  # to Accruing until 24h re-accrues, and any further restart in that window
  # restarts the clock. With a PVC, valkey reloads /data on start and the
  # accrued history is preserved.
  dataStorage:
    enabled: true
    # requestedSize MUST be non-empty or the subchart silently falls back to
    # emptyDir (the exact failure above). Sized at ~2x the memory limit; scale
    # it with the memory knobs (see banner).
    requestedSize: 192Mi
    # className empty ("") uses the cluster's default StorageClass. Set it to
    # pin a specific class (e.g. a faster or retained one).
    className: ""

store:
  # endpoint is used when valkey.enabled is false.
  endpoint: "redis://localhost:6379"

certManager:
  # When true, a self-signed Issuer and Certificate are created and cert-manager
  # injects the caBundle into the MutatingWebhookConfiguration automatically.
  # cert-manager must already be installed in the cluster.
  enabled: true

# defaultMetricsSources installs MetricsSource objects so measurements work out of
# the box. Each entry is keyed by plugin type. Set enabled: false on any entry to
# skip it and manage that MetricsSource yourself.
defaultMetricsSources:
  # kubernetesMetrics uses the Kubernetes Metrics API (metrics-server) for CPU and
  # memory. metrics-server must be installed in the cluster; it is not bundled here.
  kubernetesMetrics:
    enabled: true
    name: kubernetes-metrics
    # pollInterval is the minimum time between collection cycles. At 5m a single
    # pod accrues ~288 samples over 24h, which clears the default policy's
    # minDataPoints (250) so a lone long-running pod becomes eligible at the 24h
    # minTimeSpan mark. Local testing overrides this to a few seconds; see
    # charts/ballast/presets/local-testing.yaml.
    pollInterval: "300s"
    # reservoirSize is the hard cap on stored samples per container per metric.
    reservoirSize: 10000
  # kubeletSummary uses the kubelet Summary API (via the API server proxy) for
  # ephemeral-storage. No extra credentials are required beyond the ballast
  # ServiceAccount (nodes/proxy get is added to the ClusterRole).
  kubeletSummary:
    enabled: true
    name: kubelet-summary
    pollInterval: "300s"
    reservoirSize: 10000

telemetry:
  # serviceName and serviceNamespace are injected as OTEL_SERVICE_NAME and
  # OTEL_RESOURCE_ATTRIBUTES so OTel exporters (and Prometheus metric labels)
  # identify the app correctly. Override in your deployment values as needed.
  serviceName: "ballast"
  serviceNamespace: "tightlinesoftware.com"
  prometheus:
    # enabled exposes OTel metrics on the controller-runtime /metrics endpoint.
    # Requires setting a real metrics-bind-address (e.g. :8080) via the port field below.
    enabled: false
    port: 8080
    # secure serves /metrics over HTTPS on :8443 (requires cert-manager or custom certs).
    secure: false
    serviceMonitor:
      # enabled creates a Prometheus Operator ServiceMonitor.
      enabled: false
      interval: "30s"
      scrapeTimeout: "10s"
  otel:
    # enabled pushes metrics to an OTLP collector.
    enabled: false
    # endpoint is the OTLP collector address, e.g. otel-collector:4317.
    endpoint: ""
    # protocol is "grpc" (default) or "http/protobuf".
    protocol: "grpc"
    # insecure disables TLS for the OTLP connection.
    insecure: false
    # interval is the push interval, e.g. "30s".
    interval: "30s"

# defaultClusterResourcePolicy installs a catch-all policy that applies to all
# opted-in pods. The values below are the "homogeneous-large-fleet" preset: it
# sizes CPU requests at avg * 1.25 (= mean / 0.80 target utilization), memory
# requests at p75, sets a memory limit at p99 + 20% headroom, and sizes
# ephemeral storage requests/limits from the kubelet Summary API. It requires
# 250 samples over 24 hours before acting.
#
# This is the built-in default preset. Other presets ship as values overlays under
# charts/ballast/presets/ (see presets/README.md) and are selected at install time
# with `-f`, e.g. `helm install ... -f charts/ballast/presets/local-testing.yaml`.
# A later `-f` file or `--set` deep-merges on top of these values (map fields merge;
# list fields like `metrics` are replaced wholesale).
#
# Set enabled: false if you want to manage ClusterResourcePolicy objects yourself.
# To scope the default policy to specific namespaces or workload kinds, set
# enabled: false and create your own ClusterResourcePolicy (or ResourcePolicy).
#
# Note: this policy has priority 0 (the lowest). Any ClusterResourcePolicy or
# ResourcePolicy with a higher priority value wins for matched workloads.
defaultClusterResourcePolicy:
  enabled: true
  name: default
  priority: 0
  # metricsSource is the default MetricsSource name; a metric entry without its
  # own `source` falls back to this. Change it if you disable defaultMetricsSources
  # and create your own. Ephemeral-storage entries override it with kubelet-summary.
  metricsSource: kubernetes-metrics
  # metrics defines what to measure and which resource fields to set.
  #
  # The CPU request is sized at avg * 1.25: CPU usage is spiky and idles far
  # below its bursts, so for a large homogeneous fleet (where aggregate
  # pressure is predictable) sizing at 80% of mean (= mean / 0.80 target
  # utilization) keeps nodes dense while leaving headroom for normal variation.
  #
  # The memory request is sized at p75, deliberately NOT the CPU formula.
  # Memory working set is occupancy, not utilization: it is nearly flat per
  # container (p99 typically sits within ~15-30% of the mean), so a
  # utilization-target formula like avg * 1.25 would put every request above the
  # container's all-time observed p99 and pin the fleet's aggregate reservation
  # at 125% of aggregate usage, all of it reserved-but-unusable capacity. Spike
  # protection is the limit's job, not the request's; the request only needs to
  # state typical occupancy so the scheduler's claim matches reality. p75 states
  # that occupancy directly: the request covers actual usage ~75% of the time,
  # so the scheduler's claim sits at or just above real usage rather than under
  # it. It also self-adjusts to each workload's spread instead of a fixed
  # cushion on the median: for a flat container p75 is within a few percent of
  # p50 (no new waste), while a container with real variation gets proportionally
  # more room exactly where it needs it. p75 stays clear of the tail (p95/p99)
  # where brief startup spikes live, so it remains stable enough not to re-trip
  # the 10% drift threshold; no headroom multiplier is applied.
  #
  # The memory limit is set at p99 * 1.2: p99 is the highest usage seen in
  # production, and the 20% headroom absorbs a normal rare spike while still
  # OOMKilling a pod that runs well past its observed peak (a likely leak). This
  # yields Burstable QoS (limit > request), the right class for most production
  # workloads. CPU limits are intentionally omitted: they cause throttling
  # rather than reclaiming waste.
  metrics:
    - resource: cpu
      field: request
      aggregation: avg
      headroom: "1.25"
    - resource: memory
      field: request
      aggregation: p75
      headroom: "1.0"
    - resource: memory
      field: limit
      aggregation: p99
      headroom: "1.2"
    # Ephemeral-storage entries read from the kubelet Summary API. The request is
    # sized at p90 (the growth-skewed distribution) and the limit at p99 * 1.2 so
    # the kubelet evicts a genuine runaway pod before the node hits disk pressure
    # while tolerating a normal spike above the observed peak.
    - resource: ephemeral-storage
      field: request
      source: kubelet-summary
      aggregation: p90
      headroom: "1.0"
    - resource: ephemeral-storage
      field: limit
      source: kubelet-summary
      aggregation: p99
      headroom: "1.2"
  readiness:
    # minDataPoints is the minimum number of samples before Ballast will act.
    # Sized against the 5m poll interval above: a single pod running 24h accrues
    # ~288 samples, so 250 keeps the 24h minTimeSpan (not the sample count) as the
    # binding constraint while leaving margin for occasional missed polls.
    minDataPoints: 250
    # minTimeSpan is the minimum history window required.
    minTimeSpan: "24h"
    # maxCV is the maximum coefficient of variation (stddev/mean) allowed.
    # High CV means the workload is too spiky to size reliably.
    maxCV: "1.5"
    # cvMeanFloor exempts a resource from the maxCV check when its mean usage is
    # below the given quantity. CV is meaningless near a zero mean (quantization
    # noise and rare startup spikes dominate), and usage this small is safe to
    # size regardless of dispersion; without the floor, one near-idle resource
    # would keep the whole profile Accruing forever. The floors are deliberately
    # tiny. Set a resource to "0" to always apply the CV check.
    cvMeanFloor:
      cpu: "25m"
      memory: "25Mi"
      ephemeral-storage: "2Mi"
  behaviors:
    thresholds:
      # default is the minimum drift from the recommendation before a resize fires.
      # Set at 10%: in-place resize is cheap and safe (a request/limit patch on a
      # running pod, no restart), so there is little reason to tolerate a wide band
      # of staleness. A recommendation that has moved more than 10% from the current
      # value reflects a real shift in observed usage worth acting on, not noise.
      default: "10%"
    resize:
      # maxChangePerCycle caps a single adjustment at this percentage of the gap
      # between the current and recommended values; a step landing within the
      # drift threshold applies the recommendation exactly.
      maxChangePerCycle: "50%"
      # interval is how often the ResourceAdjuster re-evaluates drift.
      interval: "15m"
