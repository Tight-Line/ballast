name: Snyk Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1'  # Weekly Monday 6am UTC

permissions:
  contents: read

jobs:
  snyk:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write  # upload Snyk SARIF to code scanning
    env:
      # Empty on Dependabot/fork runs, which get no access to Actions secrets.
      # Go dependency bumps are still gated by the tokenless govulncheck job in
      # ci.yml; Snyk runs fully on trusted PRs, on push to main, and on schedule.
      SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4.4.0

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version-file: go.mod

      - name: Run Snyk to check for vulnerabilities
        if: ${{ env.SNYK_TOKEN != '' }}
        uses: snyk/actions/golang@8e119fbb6c251787721d34ba683ed48eba792766 # master
        with:
          args: --severity-threshold=high

      - name: Upload Snyk results to GitHub Code Scanning
        if: ${{ always() && hashFiles('snyk.sarif') != '' }}
        uses: github/codeql-action/upload-sarif@4187e74d05793876e9989daffde9c3e66b4acd07 # v3.37.3
        with:
          sarif_file: snyk.sarif
        continue-on-error: true
