version: 2
updates:
  # Go modules
  - package-ecosystem: gomod
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    groups:
      # Roll routine minor/patch bumps into one PR; majors stay separate.
      go-minor-patch:
        applies-to: version-updates
        update-types:
          - minor
          - patch
      # Security fixes are grouped on their own so they land fast and visibly.
      go-security:
        applies-to: security-updates
        patterns:
          - "*"

  # GitHub Actions used by the workflows in .github/workflows
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    groups:
      actions-all:
        applies-to: version-updates
        patterns:
          - "*"
      actions-security:
        applies-to: security-updates
        patterns:
          - "*"

  # Docker base images in the Dockerfile
  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5

  # Dev container features
  - package-ecosystem: devcontainers
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
