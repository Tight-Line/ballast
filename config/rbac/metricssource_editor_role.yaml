# This rule is not used by the project ballast itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants permissions to create, update, and delete resources within the ballast.tightlinesoftware.com.
# This role is intended for users who need to manage these resources
# but should not control RBAC or manage permissions for others.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: ballast
    app.kubernetes.io/managed-by: kustomize
  name: metricssource-editor-role
rules:
- apiGroups:
  - ballast.tightlinesoftware.com
  resources:
  - metricssources
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - ballast.tightlinesoftware.com
  resources:
  - metricssources/status
  verbs:
  - get
