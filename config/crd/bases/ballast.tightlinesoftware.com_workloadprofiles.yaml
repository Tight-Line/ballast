                            format: int64
                            type: integer
                          source:
                            description: Source is the MetricsSource name that produced
                              these stats.
                            type: string
                          stdDev:
                            description: StdDev is the standard deviation of observed
                              usage.
                            type: string
                          timeSpan:
                            description: TimeSpan is the duration covered by the samples.
                            type: string
                        required:
                        - resource
                        - source
                        type: object
                      type: array
                  required:
                  - name
                  type: object
                type: array
              meetsThreshold:
                description: MeetsThreshold is true when the profile has sufficient
                  history to act on.
                type: boolean
              selectorLabels:
                additionalProperties:
                  type: string
                description: |-
                  SelectorLabels are used to query pods from the metrics API.
                  Keys absent from the originating pod carry the sentinel value "--missing--",
                  which the metrics plugin translates to a Kubernetes "!key" (does-not-exist)
                  requirement. This prevents a profile for "name=nginx, no-component" from
                  accidentally collecting metrics from "name=nginx, component=server" pods.
                type: object
