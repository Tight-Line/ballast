    controller-gen.kubebuilder.io/version: v0.21.0
  name: workloadprofiles.ballast.tightlinesoftware.com
spec:
  group: ballast.tightlinesoftware.com
  names:
    kind: WorkloadProfile
    listKind: WorkloadProfileList
    plural: workloadprofiles
    singular: workloadprofile
  scope: Cluster
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.activeWorkloads
      name: ActiveWorkloads
      type: integer
    - jsonPath: .status.conditions[?(@.type=='Ready')].status
