                            type: string
                          request:
                            description: Request is the recommended resource request
                              value.
                            type: string
                        type: object
                      description: Recommendations holds the cached recommended resource
                        values.
                      type: object
                    usageStats:
                      description: UsageStats holds raw aggregated usage data per
                        resource per source.
                      items:
                        description: ContainerUsageStats holds aggregated usage statistics
                          for one resource from one source.
                        properties:
                          cv:
                            description: CV is the coefficient of variation (stddev/mean).
                            type: string
                          lastUpdated:
                            description: LastUpdated is when this stats block was
                              last refreshed.
                            format: date-time
                            type: string
                          mean:
                            description: Mean is the mean observed usage.
                            type: string
                          p50:
                            description: P50 is the 50th percentile of observed usage.
                            type: string
                          p75:
                            description: P75 is the 75th percentile of observed usage.
                            type: string
                          p90:
                            description: P90 is the 90th percentile of observed usage.
                            type: string
                          p95:
                            description: P95 is the 95th percentile of observed usage.
                            type: string
                          p99:
                            description: P99 is the 99th percentile of observed usage.
                            type: string
                          resource:
                            description: Resource is the Kubernetes resource name
                              (e.g. "cpu", "memory").
                            type: string
                          samples:
                            description: Samples is the number of data points in the
