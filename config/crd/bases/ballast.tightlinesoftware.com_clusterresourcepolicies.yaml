                                  type: string
                              type: object
                            description: |-
                              ResourceThresholds provides per-resource per-field overrides.
                              Coalesce order: resourceThresholds -> eviction.default -> thresholds.default
                            type: object
                        type: object
                      resize:
                        description: Resize contains thresholds specific to the resize
                          behavior.
                        properties:
                          default:
                            default: 20%
                            description: Default overrides the global default threshold
                              for resize.
                            type: string
                          resourceThresholds:
                            additionalProperties:
                              description: ResourceFieldThresholds maps resource fields
                                (request, limit) to drift thresholds.
                              properties:
                                limit:
                                  description: Limit is the drift threshold for the
                                    limit field.
                                  type: string
                                request:
                                  description: Request is the drift threshold for
                                    the request field.
                                  type: string
                              type: object
                            description: |-
                              ResourceThresholds provides per-resource per-field overrides.
                              Coalesce order: resourceThresholds -> resize.default -> thresholds.default
                            type: object
                        type: object
                    type: object
