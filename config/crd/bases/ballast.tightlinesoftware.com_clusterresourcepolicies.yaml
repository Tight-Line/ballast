                        items:
                          description: |-
                            A label selector requirement is a selector that contains values, a key, and an operator that
                            relates the key and values.
                          properties:
                            key:
                              description: key is the label key that the selector
                                applies to.
                              type: string
                            operator:
                              description: |-
                                operator represents a key's relationship to a set of values.
                                Valid operators are In, NotIn, Exists and DoesNotExist.
                              type: string
                            values:
                              description: |-
                                values is an array of string values. If the operator is In or NotIn,
                                the values array must be non-empty. If the operator is Exists or DoesNotExist,
                                the values array must be empty. This array is replaced during a strategic
                                merge patch.
                              items:
                                type: string
                              type: array
                              x-kubernetes-list-type: atomic
                          required:
                          - key
                          - operator
                          type: object
                        type: array
                        x-kubernetes-list-type: atomic
                      matchLabels:
                        additionalProperties:
                          type: string
                        description: |-
                          matchLabels is a map of {key,value} pairs. A single {key,value} in the matchLabels
                          map is equivalent to an element of matchExpressions, whose key field is "key", the
                          operator is "In", and the values array contains only "value". The requirements are ANDed.
                        type: object
                    type: object
                    x-kubernetes-map-type: atomic
                  namespaces:
                    description: Namespaces filters by namespace name patterns.
                    properties:
                      exclude:
                        description: |-
                          Exclude is a list of patterns; the pod's namespace must NOT match any.
                          Uses the same /regex/ or exact syntax as Include.
                          A namespace matching both Include and Exclude is excluded (logged at WARN).
                        items:
                          type: string
                        type: array
                      include:
                        description: |-
                          Include is a list of patterns; the pod's namespace must match at least one.
                          Patterns wrapped in forward slashes are full-string regexes (e.g. /.*-prod/).
                          All other patterns are exact string matches. Absent means all namespaces pass.
                        items:
                          type: string
                        type: array
                    type: object
                type: object
            type: object
