                  properties:
                    aggregation:
                      description: 'Aggregation is the usage percentile to use: p50,
                        p95, p99, max, avg.'
                      enum:
                      - p50
                      - p95
                      - p99
                      - max
                      - avg
                      type: string
                    field:
                      description: 'Field is the Kubernetes resource field to set:
                        "request" or "limit".'
                      enum:
                      - request
                      - limit
                      type: string
                    headroom:
                      default: "1.0"
                      description: |-
                        Headroom is the multiplier applied to the aggregated usage value.
                        Expressed as a decimal string (e.g. "1.2"); must be greater than 0.
                      type: string
                    resource:
                      description: Resource is the Kubernetes resource being measured
                        (e.g. "cpu", "memory").
                      minLength: 1
                      type: string
                    source:
                      description: Source is the name of the MetricsSource to use.
                      minLength: 1
                      type: string
                  required:
                  - aggregation
                  - field
                  - resource
                  - source
                  type: object
                type: array
              priority:
                default: 0
                description: |-
                  Priority determines which policy wins when multiple match a workload.
                  Higher value wins. Same-priority ties break alphabetically by name.
                format: int32
                type: integer
              readiness:
                description: Readiness defines the conditions that must pass before
                  Ballast acts.
                properties:
                  maxCV:
                    default: "1.5"
                    description: MaxCV is the maximum coefficient of variation (stddev/mean)
                      allowed.
                    type: string
                  minDataPoints:
                    default: 500
                    description: MinDataPoints is the minimum number of samples required.
                    format: int64
                    minimum: 1
                    type: integer
                  minTimeSpan:
                    default: 24h
                    description: MinTimeSpan is the minimum duration of observed history
                      required.
                    type: string
                type: object
              selector:
