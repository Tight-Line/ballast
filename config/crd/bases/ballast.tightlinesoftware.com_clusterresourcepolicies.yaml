                    type: object
                  kinds:
                    description: |-
                      Kinds lists the owner kinds this policy applies to (e.g. Deployment, StatefulSet).
                      Empty means all kinds.
                    items:
                      type: string
                    type: array
                  labelSelector:
                    description: LabelSelector is a standard Kubernetes label selector
