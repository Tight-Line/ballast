              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: spec defines the desired state of ClusterResourcePolicy
            properties:
              behaviors:
                description: Behaviors defines thresholds and parameters for resize
                  and eviction.
                properties:
                  eviction:
                    description: Eviction configures pod eviction behavior.
                    properties:
                      cooldown:
                        default: 1h
                        description: Cooldown is the minimum time between evictions
                          for the same workload.
                        type: string
                      maxConcurrentEvictions:
                        default: 1
                        description: |-
                          MaxConcurrentEvictions limits how many pods for a given profile can be
                          terminating or not-yet-ready simultaneously.
                        format: int32
                        minimum: 0
                        type: integer
                      minOtherHealthyReplicas:
                        default: 1
                        description: |-
                          MinOtherHealthyReplicas is the minimum number of other healthy replicas
                          that must exist before an eviction is allowed.
                        format: int32
                        minimum: 0
                        type: integer
                    type: object
                  resize:
                    description: Resize configures in-place pod resize behavior.
                    properties:
                      interval:
                        default: 15m
                        description: Interval is how often the ResourceAdjuster re-evaluates
                          drift.
                        type: string
                      maxChangePerCycle:
                        default: 50%
                        description: MaxChangePerCycle caps how much a single adjustment
                          cycle can change a value.
                        type: string
                    type: object
