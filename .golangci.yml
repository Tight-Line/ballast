version: "2"

run:
  timeout: 5m
  tests: true

linters:
  enable:
    - copyloopvar
    - errcheck
    - gocritic
    - gocyclo
    - govet
    - ineffassign
    - misspell
    - modernize
    - revive
    - staticcheck
    - unconvert
    - unparam
    - unused
  settings:
    misspell:
      locale: US
    gocritic:
      enabled-tags:
        - diagnostic
        - style
        - performance
      disabled-checks:
        - hugeParam
        - rangeValCopy
        - octalLiteral
        - emptyStringTest
        - deprecatedComment
        - httpNoBody
    modernize:
      disable:
        - omitzero
        - newexpr
    revive:
      rules:
        - name: comment-spacings
        - name: import-shadowing
  exclusions:
    generated: lax
    rules:
      - path: "_test\\.go"
        linters:
          - unparam
          - errcheck
      - source: "defer (resp|conn|client)\\..*Close"
        linters:
          - errcheck
    paths:
      - third_party$
      - builtin$
      - examples$
      - ^test/

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    gofmt:
      simplify: true
    goimports:
      local-prefixes:
        - github.com/tight-line/ballast
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
